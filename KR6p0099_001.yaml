body:
  text: 知歸學人彭際清集一起教大綱經言從是西方過十萬億佛土有世界名曰極樂七寶莊嚴無三惡道亦無女人衣食自然壽命無量其佛號阿彌陀放大光明接引一切念佛衆生往生彼國蓮華化生不由胎藏若人能一心歸命阿彌陀佛每日合掌向西專稱佛號或數萬聲或一萬聲或千百聲乃至臨終十念俱得往生見佛聞法永不退轉其知書識字者每日誦小阿彌陀經一卷或三卷或隨力隨分兼誦無量壽經觀經華嚴法華圓覺金剛楞嚴維摩等經及起信唯識等論俱係上品資糧平居又須受持三歸五戒集諸功德回向西方得效更穩或以釋迦文佛降生之處謂為西方淨土者謬也釋迦降生天竺與此震旦同在南贍部洲舉足可到合四大部洲為一四天下如此百億四天下名為一佛土從是而西過十萬億佛土乃至極樂世界以此例彼其相去豈直天淵而已耶如來為一大事因緣出現於世無非教人識自本心明見佛性是心是佛離心無佛於斯薦得不歷程途直趨寶所是名念自性佛亦名念實相佛然此衆生根器不齊猝難證入即或依教生信自肯承當而無明未破業種宛然入胎出胎迷失正念無可奈何所以復開往生淨土一門教令念阿彌陀佛回向西方極樂由阿彌陀佛往昔因中發四十八願遍攝羣品無論若智若愚或善或惡十念功成橫截生死故謂諸方便中最勝方便欲入此門先須知苦既知苦已須求出苦一切衆生以苦為樂不思此身自無量劫來暫在人天驚同閃電俄而銅柱鐵牀魂遊地獄俄而毛羣羽族血染刀砧皆由業識所牽如牛拽磨輪轉無窮即今暫得此生老病死衰疾於呼吸惡露不淨無異臭尸是非發決定心起精進行何由出離更念人在世間實賴天地父母生成之力然天地父母能賦我官駭𢌿我衣食而不能脫我苦輪開我正覺唯有阿彌陀佛大慈大悲能救我能攝受我承斯恩力如虎負山如龍得水心心不捨步步不離三昧成時現前見佛自利利他同登彼岸豈不快哉二淨業正因經云欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業今先明歸戒經云昔有梵志饒財多寶若布施時金鉢盛銀銀鉢盛金乃至玉女象馬衣裳房舍各足八萬四千之數如上施福不如受三自歸受三歸者施一切衆生無畏如上布施及受三歸福復不如受五戒福受五戒者功德具滿故凡受歸戒須從師受設未遇師時先向佛前日誦三歸章句其五戒行之既熟然後求師證明如能發大菩提心進受菩薩戒則更善矣其三歸云歸依佛不墮地獄我今歸依佛歸依法不墮餓鬼我今歸依法歸依僧不墮旁生我今歸依僧每時課畢復稱云自歸於佛當願衆生紹隆佛種發無上意自歸於法當願衆生深入經藏智慧如海自歸於僧當願衆生統理大衆一切無礙三節三拜其五戒者一不殺生凡有生命乃至魚蝦蚤蝨之類俱不得殺能放生者更善二不偷盜凡非我所有乃至一針一芥不得故取能布施者更善三不邪淫凡非其匹偶俱不得犯能永斷欲事者更善四不妄語凡無實之言乃至呪詛惡罵俱不切發能勸人為善者更善五不飲酒自不飲酒亦不得教人飲酒能長齊不晚食者更善經言每月初八十四十五二十三二十九三十如月小則用二十八二十九凡六日四天王巡行南洲觀察人間善惡又正五九凡三月帝釋以大寶鏡正照南洲考核罪福並宜齊戒念佛懺悔修省謂之年三齊月六齊又每月加初一十八二十四二十八為十齊見地藏經初發心人並宜留意三淨課儀式每日晨昏佛前焚香作禮誦阿彌陀經一卷唱云阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩衆亦無邊四十八願度衆生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛南無阿彌陀佛或千聲或三千聲南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各十聲誦畢稱佛名膜拜或四十八或二十四少則九拜菩薩海衆各三拜拜時觀想聖容如在琉璃寶地親聞說法依正莊嚴了然明白隨誦回向文云一心歸命極樂世界阿彌陀佛願以淨光照我慈誓攝我我今正念稱如來名為菩提道求生淨土佛昔本誓若有衆生欲生我國至心信樂乃至十念若不生者不取正覺以此念佛因緣得入如來大誓海中承佛慈力衆罪消滅淨因增長若臨命終自知時至身無病苦心不貪戀意不顛倒如入禪定佛及聖衆手執金臺來迎接我於一念頃生極樂國華開見佛即聞佛乘頓開佛慧廣度衆生滿菩提願十方三世一切佛一切菩薩摩訶薩摩訶般若波羅蜜誦畢稱三自歸一稱一拜文見前如是行持每日或二時或四時或六時若有事緣但行晨朝十念謂盡一口氣為一念制心不亂一以當百其餘隨力隨時常提六字或四字不可忘失普賢行願品若欲成就如來功德門當修十種廣大行願一者禮敬諸佛二者稱讚如來三者廣修供養四者懺悔業障五者隨喜功德六者請轉法輪七者請佛住世八者常隨佛學九者恆順衆生十者普皆回向願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界乃至虗空世界盡衆生及業煩惱盡如是一切無盡時我願究竟恆無盡我此普賢殊勝行無邊勝福皆回向普願沈溺諸衆生速往無量光佛剎右節録普賢行願品末卷文此卷攝全部華嚴指歸極樂能讀誦全卷者最是往生捷徑或但用此節文作夜課回向俾菩提苗日夕增長其生品亦定當殊勝也四西方境觀修淨業者持名之外必兼觀想觀想之法具詳觀無量壽佛經今不具録但依慈雲大師所明觀法出其大略云欲修往生觀者當於一處繩牀西向跏趺端坐頂脊相對不昂不傴調和氣息定住其心所修觀門略示二種仍逐所宜不必并用一者普觀自想即時所修計功合生極樂世界當便起心生於彼想於蓮華中結跏趺坐作華合想作華開想當華開時有五百色光來照身想作眼目開想見佛菩薩及國土想即於佛前坐聽妙法及聞一切音聲皆說所樂聞法所聞要與十二部經合作此想時大須堅固令心不散心想明了如眼所見經久乃起二者直想阿彌陀佛丈六金軀坐於華上專繫眉間白毫一相其毫長一丈五尺周圍五寸外有八楞其毫中空右旋宛轉在眉中間瑩淨明徹不可具說顯映金顏分劑分明作此想時停心注想堅固勿移然復應觀想念所見若成未成皆想念因緣無實性相所有皆空一如鏡中面像如水現月影如夢如幻即假即空即中不一不異非從非橫不可思議心想寂靜則能成就念佛三昧今繪接引見佛二圖以資觀力下用九蓮分標九品蓮各四十八葉以表所持佛名一一流入如來願海此土發願往生彼寶池中即生蓮華一本精進者華日榮懈怠者華日悴九品高下於此可驗末總為一大圓圖以表九品總歸一乘故曰無不從茲法界流無不還歸此法界或有不樂修觀者專一持名亦無不可持到一心不亂三昧現前即觀在其中矣接引往生見佛聞法上品上生上品中生上品下生中品上生中品中生中品下生下品上生下品中生下品下生九品同歸右九品蓮臺及大圓鏡圖共四千八百圈每誦佛名十串以硃點一圈合各串零頭約得五百萬之數積久點滿又以黑白青黃四色點之分點五次計得二千五百萬填滿後再易新本若能勤行精進每點各加十倍以萬當千更好其舊本或向佛前焚化或俟臨命終時焚化仗此勝因決生淨土每本填滿即注云弟子持誦萬德洪名滿萬之數願與一切有情回向菩提求生淨土五往生功行往生正因念佛為主功行為助何名功行一誦讀大乘二勤行方便大乘者即前所列諸經日誦一卷或數卷周而復始但須精熟不必貪多精熟後尤貴博問先知深解義趣銷歸自性方不枉費工夫方便者本蓮池大師作福圖說條列如左其四料簡曰作福不念佛福盡還沈淪念佛不作福入道多苦辛無福不念佛地獄鬼畜羣念佛兼作福後證兩足尊其作福條目云孝順父母忠報君王裝塑佛像印造經典齊供僧伽敬事師長營修寺宇流通善法禁絶宰殺買放生命飯食飢民衣濟寒凍開掘義井修理橋梁平砌階道普施茶湯看療病人給散藥餌伸雪冤枉出減刑罪安養衰老撫育孤孩埋藏尸骨給與棺木饒免債負義讓財産還他遺失救濟患苦祈禳災難薦拔亡魂勸和爭訟生全人命如上所說誦經作福俱可資助往生尚有無始以來深重罪業不加懺悔莫能湔洗所以普賢十大願王懺悔居一行者但勤行懺悔臨命終時直往西方更無障礙今繪四圖於左首誦經次懺悔次作福次普度凡誦經禮懺每一卷加一點如小阿彌陀經三遍為一卷心經二十一遍當一卷懺用淨土及大悲等不能禮懺者但稱南無阿彌陀佛向西膜拜每百拜抵懺一卷須至誠懇惻如對目前不得散亂作福一件如前加一點其施錢功德須分三等力饒者以千錢為一件次以三百錢為一件下者以百錢為一件至求生淨土尤貴發菩提心菩提者覺也覺則心佛衆生三無差別從前所有行願自利居多利他偏少今別列一圖運心分注代彼四恩三有回向菩提求生淨土庶得冤親等度宏濟無窮讀誦大乘懺除業障勤修方便等度冤親右四圖每圖四百八十圈如前五次填滿不能五次即量行節減亦可注云弟子持誦經共千百卷願與一切有情回向菩提求生淨土弟子禮誦懺儀共千百卷願與一切有情回向菩提求生淨土弟子謹遵遺教廣修衆善今合計所行共千百件願與一切有情回向菩提求生淨土弟子普為四恩三有代申回向今將所誦萬德洪名一圖分為十分一奉祖先父母一奉帝主大臣一奉三黨眷屬一奉師友一奉諸天一奉諸鬼神衆一奉地獄衆生一奉冠帶人倫一奉編氓下賤一奉羽毛鱗介蜎飛蠕動之屬盡此報身同生淨土
