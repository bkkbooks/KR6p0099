body:
  text: 知歸學人彭際清集六蓮宗開示專雜二修說唐善導和尚問何故不令作觀直遣專稱名號答衆生障重境細心粗識揚神飛觀難成就是以大聖悲憐直勸專稱名字正由稱名易故相續即生若能念念相續畢命為期者十即十生百即百生何以故無外雜緣得正念故與佛本願相應故不違教故順佛語故若捨專念修雜業者百中希得一二千中希得三四何以故乃由雜緣亂動失正念故與佛本願不相應故與教相違故不順佛語故繫念不相續故心不相續念報佛恩故雖作業行常與名利相應故樂近雜緣自障障他往生正行故比見諸方道俗解行不同專雜有異但使專意作者十即十生修雜不至心者千中無一願一切人等善自思惟行住坐臥必須厲心克己晝夜莫廢畢命為期前念命終後念即生長時永劫受無為法樂乃至成佛豈不快哉臨終正念訣同上凡夫臨終欲生淨土須是不得怕死常念此身多苦不淨惡業種種交纏若得捨此穢身超生淨土乃是稱意之事如脫敝衣得換珍服放下身心莫生戀著才遇有病便念無常一心待死須囑家人及問候人來我前者為我念佛不得說眼前閒雜之話及家中長短之事亦不須軟語安慰祝願安樂此皆虗華無益若病重將終親屬不得垂淚哭泣及發嗟歎懊惱聲惑亂心神失其正念但同聲念佛守令氣盡若得明曉淨土之人頻來䇿勵極為大幸依此法者決定往生更無疑也禪淨四料簡宋永明禪師有禪無淨土十人九錯路陰境若現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不開悟有禪有淨土猶如戴角虎現世為人師當來作佛祖無禪無淨土鐵牀并銅柱萬劫與千生沒箇人依怙往生問答同上問觀經明十六觀門皆是攝心修定觀佛相好諦了圓明方階淨域如何散心而能化往答九品經文自有升降上下該攝不出二心一定心如修習定觀上品往生二專心但念名號衆善資熏回向發願得成末品仍須一生歸命盡報精修坐臥之間常面西向當行道禮敬之際念佛發願之時懇苦翹誠無諸異念如就刑獄若在狴牢怨賊所追水火所逼一心求救願脫苦輪速證無生廣度含識紹隆三寶誓報四恩如斯志誠必不虗棄如或言行不稱信力輕微無念念相續之心有數數間斷之意平時懈怠臨終望生但為業障所牽恐難值其善友風火逼迫正念不成何以故如今是因臨終是果應須因實果則不虗聲和則響順形直則影端也如要臨終十念成就但預辦津梁合集功德回向此時念念不虧即無慮矣問見性悟道便超生死何用繫念彼佛求生他方答真修行人應自審察如人飲水冷暖自知諸仁者當觀自己行解見性悟道受如來記紹祖師位能如馬鳴龍樹否念無礙辨才證法華三昧能如天台智者否宗說皆通行解兼利能如忠國師否此諸大士皆明垂言教深勸往生蓋是自利利他豈肯誤人自誤況大雄讚歎金口丁寧希從昔賢恭稟佛敕定不謬誤也至往生傳所載古今事迹顯著非一宜勤觀覽以自照知又當自度臨命終時生死去往定得自在否自無始來惡業重障定不現前此一報身定脫輪回否三途惡道異類中行出沒自由定無苦惱否天上人間十方世界隨意寄託定無滯礙否若也了了自信得及何善如之若其未也莫以一時貢高卻致永劫沈淪自失善利將復尤誰嗚呼哀哉何嗟及矣此節語載龍舒淨土文第十一卷云出王敏仲直指淨土決疑集今決疑集已不傳而世間通行淨土文祗有十卷恐漸湮沒故録其文與萬善同歸一節並列如右勸人發願偈并敘慈照宗主念佛之人若不發心求生淨土皆是埋頭過日自失善利大凡念佛先要發心欲超生死往生淨土須以大願自為主意常須念佛早晚專心禮拜彌陀如朝帝主兩不失時日近日親心口與佛相應去佛不遠口念心想心願見佛發深重願決信無疑日久歲深工夫純熟自然三昧成就臨命終時彌陀接引淨土現前更願現生之內常遇善知識不值邪見師無惑我心不生懈怠如此念佛深信發願是信行願三不虧也臨終見佛即非外來盡是唯心顯現猶如種子在地逢春發生豈是外來皆從地出也今之修行亦爾念佛信願納在八識心地臨終發現淨土彌陀即非外來皆從自心出也偈曰萬法從心生萬法從心滅我佛大沙門常作如是說持戒無信願不得生淨土唯得人天福福盡受輪回輾轉難脫離看經無慧眼不識佛深意後世得聰明亂心難出離不如念佛好現世無名利行坐不多羅則是阿彌陀發願持戒力回向生樂國如是各行持千中不失一釋迦金口說彌陀親攝受諸佛皆護念諸天善護持見此念佛人與佛不相遠應當坐道場轉於大法輪普度無邊衆譬如貧家女腹孕轉輪王諸天常愛護貧女自不知腹中有貴子今此念佛人其意亦如是憶佛常念佛不久當成佛諸佛善護持其人自不知我當生淨土卻要來後世再得生人中譬如貧人家地內有伏藏藏神常守護不令其有失貧人自不知家內有寶藏逐日趁客作求衣食自濟今此念佛人其意亦如是不知念佛人具足如來藏自說我無分反要生人中譬如病人家自有真妙藥不知妙藥性不能自治病每日牀枕邊痛苦受無量今此念佛人其意亦如是不知念佛心能滅貪瞋癡能為大醫王能為大寶藏利濟一切人能為大法王覆護一切衆將謂是凡夫不得生淨土且自持齊戒後世願為人輾轉更修行方可生彼國多見修行人常作如是說不稱彌陀願不合淨土經邪見障覆心畢竟難出離非是他人障皆是自障心今世不得生一蹉是百蹉勸汝修行人信我如來說佛無不實語豈是虗誑言但當自精勤一心求淨土因風吹於火用力不消多幸有念佛心回願超三界逢寶不取寶遇食苦長飢咄哉大丈夫不見真實意我今略勸讚輾轉傳與人代我廣流通作於如來使真是諸佛子真名報佛恩普願如說行同生極樂國修進工夫虎溪尊者凡修淨土之人灼然是要敵他生死不是說了便休當念無常迅速時不待人須是把做一件事始得若也半進半退似信似疑濟得恁麼事如何出離輪回若是信得及便從今日去發大勇猛發大精進莫問會與不會見性不見性但只執持一句南無阿彌陀佛如靠著一座須彌山相似搖撼不動專其心一其意或參念觀念憶念十念或默念專念繫念禮念念茲在茲常憶常念朝也念暮也念行也念坐也念心念不空過念佛不離心日日時時不要放捨綿綿密密如雞抱卵常教暖氣相接即是淨念相繼更加智照則知淨土即是自心此乃上智人修進工夫如此把得定做得主靠得穩縱遇苦樂逆順境界現前只是念阿彌陀佛無一念變異心無一念退惰心無一念雜想心直至盡生永無別念決定要生西方極樂世界果能如是用功則歷劫無明生死業障自然消殞塵勞習漏自然淨盡無餘親見彌陀不離本念功成行滿願力相資臨命終時定生上品專意一念同上真信修行之事端的要生西方極樂世界專意一念持一句阿彌陀佛只此一念是我本師只此一念即是化佛只此一念是破地獄之猛將只此一念是斬羣邪之寶劍只此一念是開黑暗之明燈只此一念是度苦海之大船只此一念是脫生死之良方只此一念是出三界之徑路只此一念是本性彌陀只此一念達唯心淨土但只要記得者一句阿彌陀佛在念莫教失落念念常現前念念不離心無事也如是念有事也如是念安樂也如是念病苦也如是念生也如是念死也如是念如是一念分明不昧又何必問人覓歸程乎開示明蓮池大師妄念是病念佛是藥久病非片劑所能療積妄非暫念所能除其理一也莫管他妄念紛飛只貴在念佛精切字字分明句句接續極力執持方有趨向分所謂真積力久而一旦豁然喻如磨杵作針鍊鐵成銅者定不誣也入道多門唯此一門最為捷徑不可忽不可忽此道至玄至妙亦復至簡至易以簡易故高明者忽焉夫生死不離一念乃至世出世間萬法皆不離一念今即以此念念佛何等切近精實若覷破此念起處即是自性彌陀即是祖師西來意縱令不悟乘此念力往生極樂且橫截生死不受輪回終當大悟耳願放下萬緣十二時中念念提撕是所至望古人教親近明師求善知識而善知識實無口傳心授祕密法門只替人解黏去縛便是祕密今但執持名號一心不亂此八箇字即是解黏去縛祕密法門即是出生死堂堂大路朝念暮念行念坐念念念相續自成三昧莫更他求也真信淨土決志往生者不論已悟未悟其從事單傳直指而未悟者雖日以參禪為務不妨發願往生以未能不受後有畢竟有生處故不是偷心岐路心也其已悟者古人云汝將謂一悟便可上齊諸佛乎故普賢為華嚴長子雖塵塵華藏在在蓮而行願品必拳拳乎以往生安樂為言也已悟尚然未悟可知矣警衆同上入道要門信為第一惡事非信尚不成就況善事乎譬如世間盜賊時乎敗露官府非不以極刑繩之逮後釋免依舊不悔所以者何他卻信得者條門路不齎一文本錢獲利無算所以備受苦痛決不退悔今人念佛再不肯真切加功只是不曾深思諦信不要說不信淨土只如世尊說人命在呼吸間者一句話於義理不是難解說爾等眼裏親見耳裏親聞經過許多榜樣如今要爾信得者句話早是不能彀也爾若真實信得者句話則念佛法門不必要我費盡力氣千丁萬屬爾自如水赴壑萬牛不能挽矣豫見新學後生才把一句佛頓在心頭閒思妄想愈覺騰沸便謂念佛工夫不能攝心不知汝無量劫來生死根由何能即斷且萬念紛飛之際正是做工夫時節旋收旋散旋散旋收久後工夫純熟自然妄念不起旦汝之能覺妄念者虧者句佛耳如不念佛之時瀾翻潮涌剎那不停自己豈能覺乎念佛有默持有高聲持有金剛持然高聲覺太費力默念又易昏沈只是綿綿密密聲在唇齒之間乃謂金剛持然又不可執定或覺費力則不妨默持或覺昏沈則不妨高聲如今念佛者只是手打魚子隨口叫喊所以不得利益必須句句出口入耳聲聲喚醒自心譬如一人濃睡一人喚云某人則彼即醒矣所以念佛最能攝心今人不肯念佛只是輕視西方不知生西方乃是大德大福大智大慧大聖大賢的勾當轉娑婆成淨土不同小可因緣汝但看此城中一日一夜死卻多少人不要說生西方即生天千百人中尚無一箇其有自負修行者祇是不失人身而已故我世尊大慈大悲示此法門功過乾坤恩逾父母粉骨粹身不足為報開示憨山大師念佛求生淨土元是要了生死大事今人發心要了生死方才肯念佛只說佛可以了生死若不知生死根株畢竟向何處念若念佛的心斷不得生死根株如何了得生死如何是生死根株古人云業不重不生娑婆愛不斷不生淨土是知愛乃生死根株推此愛根不是今生有的亦不是一二三四生有的自無始以來生生世世捨身受身何曾有一念離此愛根耶如此愛根種子積劫深厚故生死無窮今日方才發心念佛只望空求生西方連生死之根尚且不知何曾有一念斷著既不知生死之根則念佛一邊念生死根只聽長如此念佛與生死兩不相關念到臨命終時只見生死愛根現前那時方知佛全不得力悔之遲矣故勸今念佛的人先要知愛是生死根本而今念佛念念要斷者愛根即日用現前在家念佛眼中見的兒女子孫家緣財産無一件不是愛的如全身在火坑中一般愛是主宰念佛是皮面且如兒女之情現前時回光看看者一聲佛果能敵得者愛麼果然斷得者愛麼若斷不得者愛畢竟如何了得生死故勸念佛人第一要為生死心切要斷生死心切要在生死根株上念念斬斷則念念是了生死之時也如此念念真切刀刀見血若不出生死則諸佛墮妄語矣修行第一要為生死心切生死不切如何敢云念佛成片且衆生自無量劫來念念妄想情根固蔽即今生出世何曾一念痛為生死日用念念循情未嘗反省今欲以虗浮信心就要斷多劫生死所謂滴水救積薪之火豈有是理哉若果為生死心切念念若救頭然只恐一失人身百劫難復將此一聲佛咬定定要敵過妄想一切處念念現前不被妄想遮障如此下苦切工夫久久純熟自然相應不求成片而自成一片矣直須勇猛更莫遲疑凡念佛時先將自己胸中雜亂念頭一齊放下放到無可放處單單提起一句阿彌陀佛歷歷分明心中不斷如線貫珠又如箭筈相拄中間無一毫空隙處如此著力靠定於一切處不被境緣牽引打失日用動靜不雜不亂夢寐如一念到臨命終時一心不亂便是超生淨土之時也每日除二時功課外單將一聲阿彌陀佛橫在胸中念念不忘心心不昧把一切世事都不思想只將一句佛作自己命根咬定牙關決不放捨乃至飲食起居行住坐臥此一聲佛時時現前若遇逆順喜怒煩惱境界心不安時就將者一聲佛提起一拶即見煩惱當下消滅以念念煩惱是生死苦根今以念佛消滅煩惱便是佛度生死苦處若念佛消得煩惱便可了得生死更無別法若念佛念到煩惱上作得主便於睡夢中作得主若於睡夢中作得主則於病苦中作得主若於病苦中作得主則於臨命終時便知去處矣此事不難行只是要一念為生死心切單單靠定一聲佛更不別向尋思久久純熟自然得大安樂得大受用示念佛法門蕅益法師念佛法門別無奇特只深信力行為要耳雲棲云一句阿彌陀佛該羅八教圓攝五宗可惜今人將念佛看做淺近勾當謂愚夫愚婦工夫信既不深行亦不力終日悠悠淨功莫剋設有巧設方便動以參究誰字為向上殊不知現前能念之心本自離過絶非不消作意離絶即現前所念之佛本自超情離計何勞說妙談玄祇貴信得及守得穩直下念去或晝夜十萬或五萬三萬以決定不缺為準畢此一生誓無變改若不得往生者三世諸佛便為誑語一得往生永無退轉種種法門咸得現前切忌今日張三明日李四遇教下人又思尋章摘句遇宗門人又思參究問答遇持律人又思搭衣用鉢此則頭頭不了帳帳不清豈知念得阿彌陀佛熟三藏十二部極則教理都在裏許千七百公案向上機關亦在裏許三千威儀八萬細行三聚淨戒亦在裏許真能念佛放下身心世界即大布施真能念佛不復起貪瞋癡即大持戒真能念佛不計是非人我即大忍辱真能念佛不稍間斷夾雜即大精進真能念佛不復妄想馳逐即大禪定真能念佛不為他岐所惑即大智慧試自簡點若身心世界猶未放下貪瞋癡念猶自現起是非人我猶自挂懷間斷夾雜猶未除盡妄想馳逐猶未永滅種種他岐猶能惑志便不為真念佛也要到一心不亂境界亦無他術最初下手須用念珠記得分明刻定課程決定無缺久久純熟不念自然然後記數亦得不記數亦得若初心便要說好看話要不著相要學圓融自在總是信不深行不力饒儞講得十二分教下得千七百轉語皆是生死岸邊事臨命終時決用不著珍重念佛工夫祇貴真實信心第一要信我是未成之佛彌陀是已成之佛其體無二次信娑婆的是苦安養的可歸熾然欣厭次信現前一舉一動皆可回向西方若不回向雖上品善亦不往生若知回向雖誤作惡行速斷相續心起殷重懺悔懺悔之力亦能往生況持戒修福種種勝業豈不足莊嚴淨土只為信力不深勝業淪於有漏又欲捨此別商誤之誤矣但加真信一切行履更不須改也七往生現果集驗知歸學人聞學老人名實定上海人嘗主天目禪原寺晚至蘇州住文星閣老人既徹法原應機利物慧辨無礙時為學人提唱念佛法門作念佛偈云念佛念自心念體元空寂當念了無依心心無別佛又曰飛鳥弄圓音水有八功德歷歷顯清機皆因淨心得又曰子母不相離淨念常相繼良哉大勢至得此無盡意又曰願力如山重往生似羽輕見知融一念無量佛名經又曰君有淨土心悟心方知土界道有金繩六時休錯路又曰西方開淨域不染世間情前路無知己君須獨自行又嘗作淨土詩一百八首暢演唯心之指普勸人發回向心尋還江陰香山寺歲杪得疾明年正月三日囑付後事至黃昏起坐呼衆至命具湯洗手者再連稱阿彌陀佛說偈而逝事在乾隆四十二年老人攝淨歸禪與從上蓮宗眼目自別即土即心非心非土直下洞然絲毫不隔如來不思議境界經云菩薩了知諸佛及一切法皆唯心量得隨順忍或入初地舍身速生妙喜世界或生極樂淨佛土中觀經云上品中生者解第一義既往生已因前夙習普聞衆聲純說第一義諦經於七日得不退轉老人足以當之矣旅亭和尚名際會嘉善人得法於聞學老人機鋒迅利嘗主席禪原已而至蘇州文星閣自言在天目西方菴修念佛三昧風聲水聲鳥聲蟲聲悉皆作唱佛聲及是掩關念佛作偈曰截斷世人生死路別開化外一乾坤不知那箇腳跟穩放下身心入此門已而下痢語戒弟子沈敬孚曰晝夜彌陀十萬聲一一從自己胸中流出方少有相應分那得工夫說閒話管閒事命侍者具湯沐浴其明日遂逝事在乾隆四十六年爾立師名廣志會稽人出家後結茅天台黃金洞專修淨業蘇州吳山殷天成詣天台飯僧服師道行延住吳山接引菴垂三十餘年隨機化導指歸淨土從受歸戒者纍百人嘗結期念佛晝夜不絶聲其弟子造之見師經行之地大書阿彌陀佛放金色光訝之以問師師曰汝自本光發現耳乾隆二十六年四月望要弟子四人詣菴供佛臨別謂曰明日午前當來送我及期衆至焚香誦阿彌陀經稱佛名千聲端坐而逝自數十年來吳中唱導淨業者必以師為首稱矣先期以常住屬法侶月映月映名普江念佛精進屢開期場集衆回向老於菴誓願師名佛安蘇州人年三十餘投上津橋天竺菴為僧已而住北濠大王廟以念佛為課得錢輒買香華供佛放諸魚鳥已而有疾逝前三日遺徒往獅林寺請僧禮淨土懺施食一壇期滿別衆稱佛名香三炷日午曰行矣端坐而逝事在乾隆四十一年金南溟翁習丹訣豫勸之學佛不應曰蘇秦有言使我有負郭田二頃安能取六國相印吾之於佛蓋心知其異而不能從也則丹訣之為豫負郭田也久矣豫曰翁之所以異佛者可得聞乎曰吾以平生目接者驗之徐莊錢青侯販醃猪一日忽謂其妻曰此罪也吾今徙業矣遂輟販請僧禮懺七日度羣猪日誦阿彌陀佛至年七十二謂家人曰吾將去矣去時勿哭為我誦佛名贈行可也越三日遂逝事在雍正二年大村顧天瑞老而無子與妻陸氏長齊修淨業僧舍有為念佛會者夫婦與焉乾隆三十五年二月天瑞無疾誦佛名而逝年七十二先數年妻有微疾沐浴就寢其妯俞氏亦修淨業隔屋居半夜聞陸氏呼之曰姆早晚好來吾先去趨視之逝矣年六十三明年四月俞氏亦無疾而逝年七十二又有豫族嬸陸氏日課佛名千聲齊期加五千聲如是二十年乾隆四十年十二月偶患腹痛翼日集家人長幼各致慰謝勸修淨業怡然而逝年八十七豫初謂念佛法門至卑近顧其效章章如是因是知佛之不可思議也念佛成佛之決非虗語也此豫之所謂異也沈敬孚名炳長洲人少得喘病過三十而劇因發出世心持佛名頗切至年五十病益甚自正月至九月一息僅屬遂矢願斷肉其友楊廣文省之勸持金剛經扶起授之讀盡卷居三日加持至三卷半月而病愈自後日以三卷為常持佛名不輟夜坐輒至曉喘病遂除尋受五戒於旅亭和尚常言世間萬法生滅不停唯有一句阿彌陀佛是大休歇處又自謂念佛工夫尤於病中得力諸苦煎熬獨一念炯然不曾打失耳乾隆四十六年十一月示微疾數日其月晦晨起洗沐畢喘甚回首向西結跏念佛其妻在旁揮之去已而寂然則坐逝矣遺言以龕殮用茶毗法其妻尋出家為尼余輯淨土聖賢録録比丘尼自劉宋迄明不過十一人而吾吳十餘年來其往生有據者乃得四人焉則其他湮沒無聞者蓋多矣惜哉其一岐松師名本印吳縣人幼多病因發願出家年二十五父母送之城中圓通菴剃染尋受具戒別買屋數間以居名曰觀幻戒行潔清勤修福業歷諸名剎供佛飯僧回向淨土其年八月自九華歸結期禮大悲懺甫逾二七忽感微疾曰吾生緣其盡乎遂輟懺專持佛名至十月初旬臥牀七日右脅西向念佛無間已而屬付後事畢命其徒誦阿彌陀經至三周寂然而逝事在乾隆四十五年其一聖可師名律宗嘉定人三歲失母其祖母𢹂至蘇城圓通菴尋剃染受具戒少好禮佛長習法華經苦不能解義因憤詣金山及杭州崇福參究纍冬歸而專修淨業屢詣諸名山供佛飯僧年五十三得咳疾遂閉關不出以西方為期至年六十四正月望集諸緇白同稱佛名至日昃顧視左右勸勉修行語劇苦切尋舉手稱西方極樂世界大慈大悲阿彌陀佛如是者三趺坐而逝蓮華香滿室中事在乾隆五十五年其一越成師名遂欽無錫人九歲出家稍長遇一尼師激發專持佛名行往無間尋住蘇州南園白衣菴興復殿堂念佛益切年五十始受具戒至五十五其年三月雞初鳴召其徒曰吾將去矣徒曰師無他恙何出此言因泣下師曰癡人哭我何益認真念佛可爾遂趺坐西向同稱佛名盡炷香乃逝事在乾隆五十三年其一見琳師名佛琦長洲人自少不願有家既長其母送閶門外雨華菴剃染尋受具戒已而受城中崇佛菴尼道堅囑付繼為菴主募金千餘兩造西方三聖旃檀像高八尺歲結七日期場集淨行僧為念佛會歷諸名山供佛飯僧為常州天寧寺置田三十畝晚而專修淨業將逝前三日見菩薩現身兩童子侍或言聞菊華香師曰此青蓮華香也八月晦有近事女問疾師令扶起集衆焚香稱佛名可二千聲遂逝事在乾隆五十六年常州柏萬安名天佑平生樂善兼奉仙佛嘗為豫言其母曹氏年六十四病熱萬安自蘇州馳歸視母氣已絶唯𮌎前微溫家人為治棺衾悉具萬安悲慟禱於白衣大士誦白衣呪一萬二千願減己壽一紀以益母涕淚并下其明日索飲閲數日病起言始死時為兩吏所引歷土地城隍諸司尋詣東嶽府府君言汝有子為汝誠禱仗大士力貸汝死命吏引出放還萬安遂勸母修淨業除一室供佛像母遂長齊日以初中後分入室掐數珠誦西方佛名輒千計居十二年年七十六九月既望晨興謂其子曰吾將去矣可召諸親屬為別明日親屬畢至母悉與語戒諸子女臨去時勿哭日飲湯五六盞至第三日昧旦起坐洗沐畢易衣就枕而逝萬安事呂真人謹嘗設乩問仙術退輒冥心端坐已而至蘇或貽以豫所刻諸書內有西方確指闢仙術指歸淨土萬安見而有省遂回向佛乘然頗疑與仙術異以問真人真人曰爾何疑哉三災到時我輩亦無別路可走樂安隱爾其勉之因令兼誦金剛般若經萬安意遂釋然有外姑許氏母年六十五矣家居亦長齊奉佛顧未能專一萬安請曰母年老盍去家吾有一室可奉母母從之遂之壻家萬安教以放下萬緣一心念佛母如其言自三月至六月未嘗有間一日向萬安下拜萬安驚問所由母曰吾生六十餘年顛倒夢想中未嘗獲一日安樂自子導我以念佛吾旦而念焉俄然而夜矣夕而念焉俄然而旦矣世間安樂何以過之微子則不及此是以拜萬安曰甚善因為稱說極樂莊嚴且曰但得一心聖境自現聖境現時亦勿生著又三月母方夜坐忽見一金蓮華現前已而化作百千萬億鄂不層出上升虗空光照無極向晨復拜萬安言其事母自是容色腴潤如三十許人終日無他言夜臥更許即起坐念佛難精進衲子不及也其年冬萬安過豫言二母事且曰賴西方確指一書得識正修行路不獨自利又善利人皆君之惠也因出金屬豫印西方確指百五十餘本將以導於其鄉豫喜萬安之正信又樂聞二母之事因并記之時在乾隆四十二年書證知歸學人古之生西方者或徵之於夢或徵之於冥或徵之於定徵之夢者如慧延之於智者楊次公之於王仲回荊王夫人之於其妾是也徵之冥者如閻羅之供永明雲棲遺像是也徵之定者如遠公之見同社諸賢袁小修之見中郎是也是三者皆不離於唯識而僧史載之學士大夫傳之亦謂其理確然可信云爾其理確然可信則其事雖不經見而不可謂罔如以為罔則凡修多羅所載其事苟不經見皆將以為罔耶近世飛鸞之化行其言罪福升沈頗益悉雖亦不離乎唯識就其可信者論之要亦不可謂罔一斷之於理而已矣豫嘗作集驗篇徵現今往生諸果不越乎臨終一念未有徵之於身後者也已而得陶氏汪氏陸生馬生一徵之於夢一徵之於冥兩徵之於鸞要皆確然可信者何信乎爾信其言如水之寒火之熱如春生而秋殺世有不信斯言者其亦不信水寒而火熱春生而秋殺者也而豈其然哉復論次其事為書證一篇乾隆四十九年春有西方大士降於玉壇為諸弟子宣揚淨土法門其言平易切深與大乘修多羅合一日豫往造焉問異時師友所生諸處大士一一答之其生淨土者四人香山老人旅亭誓願二師沈居士敬孚也生兜率者一人王季子秉寧也他如朱仲君羅臺山俱歸福報中最後問從子婦瓊樓陶氏大士曰陶氏已生西方邊地矣未幾陶氏至題詩曰雨歇閒階芳草多五年消息等流梭洞中深閉煙霞跡一任熏風送客過因語衆曰子等歸向極樂全須打得一副金鐵心腸外不為六塵所染內不為七情所錮汙泥中便有蓮華出現也一句佛號便有一光千句佛號便有千光光自內生非從外得以無相故阿彌陀佛在爾諸人面前隨處出現才有絲毫隔礙此光便不能發現矣念佛心要時時覺照方發得不退念頭念佛聲要心心悲切方發得無上願力心聲互融光明四徹無處不是佛無時不念佛方為得手佛號無量要知智慧無量神通無量慈悲無量攝受無量苟不發無量心安能親見本師頂相悲哉衆生欲念未除道根日壞佛之視爾將何以堪快快念佛去也其時豫適不在或傳以示豫踰月豫復往致札瓊樓曰聞卿得生淨土不負生平志願大善但臺山仲君清齊宏誓甚為希有尚羈福報而卿戒品未全工夫未熟乃能直往無礙此何故也其往生時光景既生後如何享用如何進修亦已見佛否已登不退地否試一一言之俾聞者起欣慕心起精進心斯亦度人之本願也其日大士降報云前月豫適從西方邊地行化而來故瓊樓亦得隨到今日彼不能至矣彼平日工夫戒力雖不及臺山輩然臨終正念遠勝臺山故感觀音接引終時見金蓮華現前即覺身變男子已到西方七寶世界衣食自然雖不能見佛每日諸大菩薩說法二會精進者漸登九品懈怠者壽五百歲娑婆百年邊地一日瓊樓自往生以來頗精進將來可得上品下生其時尚須娑婆二千年耳大士者號寂根無量壽維摩詰諸經皆嘗與法會其證果久如未能詳也瓊樓淨願甚堅病中持佛名益切臨終了無牽絓唯曰大和尚來吾去矣所謂觀音接引者非耶臺山之歿也顧諸親屬有不舍然者豫固疑其不能直往也烏呼情想分塗臺山辨之早矣而卒不能以自勝此以知愛根難而佛念不易純也可不慎哉寂根大士之降玉壇也司鸞者為陸近堂近堂名士詮元和人初在壇為友祈疾有神教禮梁皇懺近堂因禮懺發心詣天寧菴受菩薩戒及大士降鸞先後十一會近堂虔秉一心宏揚至教聞者往往發菩提心退而持名修觀誦法華經如是一二年尋得痬疾漏下臥牀不能起將終目光上矚若有所見口稱白蓮白鶴及諸上善人復連稱佛佛右脅而逝異香滿室中已而諸友詣壇叩近堂生處神報曰陸子已生西方邊地矣事在乾隆五十二年其明年五月朔近堂降壇示諸子曰有一件最切己事人人不能逃人人都忘却者汝知之乎現前爾等四大輕安精神強健曾不思一旦臥病於牀魂魄離散東西不辨南北不分前路茫茫毫無把握隨業輪轉受苦無窮唯有平生虔修淨業者到時自見佛來接引生蓮華中受諸快樂壽命無量諸子有志斯道者當講信行願三端耳信者信西方之有淨土猶此城之有閶胥娑婆在東猶此城之有婁葑娑婆既實實是有淨土豈不實實是有同在圓明覺海之中舉念可到亦猶同處一城之內舉足可到也既信得淨土決定可到又須信念佛法門如穿衣喫飯一般穿衣免凍喫飯免飢念佛免生死今日信明日不信未為真信終身信一念忽然不信未為真信從今日去直至命終一信到底更無纖毫疑惑方為真信既信有西方矣又信有念佛法門矣空言贊歎何益生死故凡發信心者即當如教奉行今日信今日即行明日信明日即行切不可曰我今後生且待耄年未晚不見道青冢多埋紅粉骨黃泉半是黑頭人何耄年之可待也又不可曰我父母之事未完兒女之債未了且待閒暇無事時未晚豈知無常迅速鬼使臨門不可向他道我父母之事未完兒女之債未畢且待閒暇無事時然後來也又有勇猛一時懈弛一時是謂人而無恆譬如雞之抱卵必其息息不離於卵俾熱氣相續方能生育若今日抱之明日去之未有能生者也涵養蓮胎亦復如是至願之一字尤為要緊世間信佛念佛者固不乏人然或求現生專貴或求來世福壽得好人身不至墮落此為背佛意指佛教你出生死你偏要入生死佛教你生極樂你偏要住娑婆一生信行盡付東流譬如種田者下了稗子而望其生苗也有是理乎故發真信者當行真行行真行者當發真願盡此一生決定不生天上人間決定要生西方淨土如此念佛方為隨順佛語不至唐喪光陰諸子勉之其後四年中嘗再隆黃敬敷家勖勉同壇語多切至自頃十餘年來現優婆夷身虔修淨業悲願具足者推南濠鏡智道人道人汪姓歸李景熹為繼室年二十六而寡發出世心受菩薩戒以佛法唱導鄉里從而起信者百餘人嘗刺舌血寫法華經阿彌陀經梵網戒品各一通年三十八病痢一日起坐洗沐合掌念佛而逝事在乾隆四十九年其後三年同里有何氏女病熱見已故七叔父赤體被髮自言在生作孽死後處黑暗中日喫惡鬼鐵棒經七八年近因觀世音降臨跪求慈拯志得離暗而出適有菩薩自西方來在冥教化為冥王師家在萬年橋即上年念佛坐逝者也因與吾家有舊乞暫放還急為我作佛事俾得生人道幸矣其兄子性三為持佛名一萬堂中回向畢仍許請僧薦乃去其夕初更何氏女忽悶絶至三更而蘇言適有一班男女執紅燈以大轎舁我去路迢遠到一大廟堂前出轎趨進殿上見青面王者坐中央左右小鬼各執鋼叉銅鎚王見我作色便取鎚欲打我慌惘之際忽見金童玉女各執幡幢自內殿出中擁一道人離地可丈許首戴青幞身搭條衣手握白拂足躡雲履端正嚴潔世無與比審視之即萬年橋李家姆也往時嘗一宿其家倣佛可識然而光彩迥絶矣姆便聲言止止王遽釋我下跪曰請如教李家姆即垂手援我引至內殿光明洞然几席靚整案間多供佛經令左右設茶果餉我其果似蘋婆香甚烈云從西方來茶畢引我歷觀地獄先見血河浩渺無涯有諸女人或倒浸河內或髼髮上指或側身橫睡血流遍體復見刀山高接雲霞百萬利刃互相撐住中有罪人矗立刀上既死復活活而又死更令左右執燈照我入黑暗獄見衆鬼皆盲頭大如斗或如栲栳頸細似管鼻液長尺許若醉若寐從黑獄出見旋磨中血肉下墜雞鴨食風吹餘肉復變為人便有鬼卒取肉寸磔重磨作粉化為蠅蚊蟻子一一散去我心酸淚下問李家姆何不救之答曰罪大障深安能即出汝今怕否人身難得可勿持戒念佛求生西方哉汝能一念阿彌陀佛吾當𢹂汝直往西方汝意云何我未及答王聞言復下跪請菩薩且住李家姆因語我言因緣未到姑俟異日來此已久恐家中驚惶可速去持齊念佛一意西方兼習經呪時至迎汝勉之勉之仍命轎送我蹶然而醒翼日汗出病良已性三親聞其事為書而傳之詩云鼓鐘于宮聲聞于外夫宮之為地也邃矣阻矣而鐘聲所及洞然其無間也浩然其莫禦也故曰誠之不可掩如此其鏡智道人之謂乎秀水馬寧良名榮祖為諸生課徒以食年三十餘得咯血疾遇祥峯文師勸令念佛病良已遂長齊受五戒日課佛名三萬如是十餘年疾復作臥牀月餘自言三聖現前說法日常在大光明中臨終見佛來迎連稱佛名右脅而逝事在乾隆五十六年時文師方閉關吳門文星閣修念佛三昧其年冬夜夢三人入室南向坐其一僧服旁兩居士神儀儼然上有白光覆頂文師禮足已問三大德自何方來僧服者曰自西方來文師曰莫非阿彌陀佛國中人否曰然因問三大德何名三人同聲答曰汝名甚麼文師曰弟子法名達文僧服者曰卻來妄語文師曰真也非妄僧服者又問汝名甚麼文師曰弟子法名達文僧服者云還要妄語文師曰弟子實非妄語如何上座云我妄語僧服者曰一切衆生以妄為真執假為實故受輪轉若有智者知是虗妄即無輪轉汝莫自迷失本真心當知真心無心真知無知覺知乃魔佛無知覺汝當信受莫懷疑惑文師言下開解復進曰如上座之說的是佛法不可思議請問上座既自阿彌陀佛國中來可曾見過阿彌陀佛否左一人答曰我向汝說汝終不信汝須親見始得三人齊起各向文師頂上一拍為說偈曰應當勤精進修諸清淨業因深則果實慎勿生疑惑又曰諸法從心生諸法從心滅心法本來空取舍不可得又曰生佛心法等譬如夢中境如幻三摩提汝已知少分偈畢忽見馬寧良嚴整威儀頂禮三人三人即騰空向西而去空中樂音嘹亮佛聲朗然寧良更向文師三拜曰蒙師勸吾發心歸依三寶勤修淨業今已生淨土得大安樂故求菩薩來演妙法以報深恩又向文師三拜合掌念佛向西而去適晨鐘乍發瞿然而覺向晨書之為紀夢篇豫惟文師此夢有三因緣一令修淨業人解第一義無念而念無生而生不住中途直趨寶所二令豁達狂禪斷滅外道知有淨土一門發無上菩提修如幻三昧三馬生之逝一往杳然縱入蓮胎孰聞孰見略通消息公據灼然是因是果如影隨形豈可誣也傳其事作蓮宗眼目云豫妻費孺人既逝玉壇弟子黃敬敷為叩之普門大士大士示云一念能回向送心先到西功修久已積終不退菩提現生懈慢國將來可登九品考菩薩處胎經云諸發意衆生欲生阿彌陀佛國者皆樂著懈慢國土不能前進袁小修記中郎語云西方邊地亦名懈慢國信解未成戒寶未全者多生此瓊樓近堂皆其侶也費氏持戒之力過彼二人而慧解弗如又未能精進據因論果邊地之生理固然乎并附論之
