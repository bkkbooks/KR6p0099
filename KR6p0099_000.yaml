front:
  text: 重訂西方公據敘吳門諸信士集西方公據一書行世閲今四十餘年板漸模糊或欲重刊新本屬豫校其得失豫閲其書所繪諸圖誘掖之意頗勤而於古德遺文信手攈拾都無倫次其詞句亦間有謬誤不可不正也於是芟煩補闕釐為七門由淺既深背小向大庶乎淨土之指南矣公據之名本東坡居士東坡南行以阿彌陀佛畫像自隨曰此軾往生公據也至疾亟時一方外友䇿以西方之事東坡曰西方不無然箇裏著力不得又云著力即差夫生死之際著力不得者由其平日未嘗著力也未嘗著力而曰著力即差是猶枵腹而談龍肉也吾甚惜東坡知有西方而不能發至誠心深心回向發願心徒取口頭解脫遂至束手臨岐而莫能自豈不痛哉菩薩從十信初心發大勇猛起大精進歷十住十行十回向復從初地乃至八地方入無功用道然猶不舍悲願饒益衆生不如是無以滿足菩提分故安有凡夫地中未曾發足便擬懸車亦終老死於蓬蓽之間而已將次探泰華之嵯峨窮江湖之浩渺其可得乎是書出普願見聞隨喜如説修行不離當處而腳下蓮華大如車輪三心具足一念往生猶壯士之伸臂不煩著力正好著力儻復較量於得與不得之間真似癡人説夢也遂録付刻工而識其緣起如此乾隆五十七年夏六月知歸學人彭際清題於文星閣僧舍重訂西方公據發凡是書多為在家二衆指點津梁故須剋數持名分圖標行俾不至為他岐所惑若能脫去萬緣淨念相繼畢命為期人我相忘自他普度魚兔在手安用筌蹄矣然諸師開示言近指遠三根普被久修行人亦未可忽識者寶諸舊本九品往生俱圖佛像在蓮華內往生係行者事圖佛未安今但畫蓮華為行者標心之境即自即他不須取相其分題四句本大智法師十六觀頌今仍其舊校正四字蓮宗要典自無量壽諸經外如天親無量壽論天台十疑論天如或問蓮池疏鈔袁氏合論等書專門述作流通既久承學之士自可隨力搜覽不能廣載其諸師開示簡易切要者略登數條舉一反三無嫌挂漏其舊本所録詞旨淺近者汰之往生事驗具載前刻淨土聖賢録中茲獨收拙著集驗書證兩篇俱係當今事迹聞見確然其舊本各條已見前録不贅淨業門頭唯論了生脫死不論世間福報舊本雜采龍舒所集現前福報用以引誘初機所謂先以欲鉤牽後令入佛智者與然欲博覽周知原書具在此則唯勸往生他不暇及重訂西方公據目次卷上序發凡一起教大綱二淨業正因三淨課儀式四西方境觀五往生功行卷下六蓮宗開示專雜二修説唐善導和尚臨終正念訣同上禪淨四料簡宋永明禪師往生問答同上勸人發願偈並敘慈照宗主修進工夫虎溪尊者專意一念同上開示明蓮池大師警衆同上開示憨山大師示念佛法門蕅益法師七往生現果集驗知皈學人書證同上重訂西方公據目次終
